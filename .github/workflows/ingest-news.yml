name: Ingest news

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger news ingest
        env:
          INGEST_URL: https://uns-n.pages.dev/api/cron/ingest?limit=3
          CRON_SECRET: ${{ secrets.UNSN_CRON_SECRET }}
        run: |
          echo "Triggering $INGEST_URL"
          if [ -n "$CRON_SECRET" ]; then
            curl --fail --silent --show-error --request POST --header "x-cron-secret: $CRON_SECRET" "$INGEST_URL"
          else
            curl --fail --silent --show-error --request POST "$INGEST_URL"
          fi
